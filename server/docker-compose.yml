version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "3005:3000" # Host port 3005 maps to container port 3000 to prevent local port 3000 collisions
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://root:examplepassword@mongodb:27017/admin
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    external: true
